[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "google-mini"
version = "0.1.0"
description = "Google TPU 3D-torus AllReduce + 训练可靠性模拟器（AI Infra Handbook Mini Demo）"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[tool.setuptools]
packages = ["google_mini"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
